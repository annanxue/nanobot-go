<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoBot 聊天</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .chat-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            background: #f5f5f5;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 16px 24px;
            background: #fff;
            border-bottom: 1px solid #e5e5e5;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            margin-right: 16px;
            font-weight: bold;
        }

        .chat-header-info h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .chat-header-info p {
            margin: 4px 0 0 0;
            font-size: 13px;
            color: #999;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            background: #f5f5f5;
        }

        .chat-message {
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
        }

        .chat-message-user {
            flex-direction: row-reverse;
        }

        .chat-avatar {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .chat-message-user .chat-avatar {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            margin-left: 12px;
        }

        .chat-message-assistant .chat-avatar,
        .chat-message-bot .chat-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }

        .chat-bubble {
            max-width: 75%;
            position: relative;
        }

        .chat-message-user .chat-bubble {
            text-align: right;
        }

        .chat-sender {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            padding: 0 16px;
        }

        .chat-message-user .chat-sender {
            text-align: right;
        }

        .chat-message-content {
            padding: 16px 20px;
            border-radius: 14px;
            word-wrap: break-word;
            line-height: 1.7;
            font-size: 16px;
            display: inline-block;
            text-align: left;
            max-width: 800px;
        }

        .chat-message-user .chat-message-content {
            background: #95ec69;
            color: #000;
            border-radius: 14px 0 14px 14px;
        }

        .chat-message-assistant .chat-message-content,
        .chat-message-bot .chat-message-content {
            background: #fff;
            color: #333;
            border-radius: 0 14px 14px 14px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .chat-message-system .chat-message-content {
            background: transparent;
            color: #999;
            font-size: 13px;
            text-align: center;
            display: block;
            max-width: 100%;
        }

        .chat-time {
            font-size: 12px;
            color: #b0b0b0;
            margin-top: 6px;
            padding: 0 16px;
        }

        .chat-message-user .chat-time {
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            flex-direction: column;
            padding: 20px 32px;
            background: #fff;
            border-top: 1px solid #e5e5e5;
            flex-shrink: 0;
        }

        .chat-toolbar {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .chat-toolbar-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: #666;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .chat-toolbar-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .chat-input-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            font-size: 16px;
            resize: none;
            min-height: 50px;
            max-height: 300px;
            line-height: 1.6;
            font-family: inherit;
            transition: all 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #07c160;
            box-shadow: 0 0 0 2px rgba(7, 193, 96, 0.1);
        }

        .chat-send-btn {
            padding: 14px 36px;
            background: #07c160;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            min-height: 50px;
        }

        .chat-send-btn:hover {
            background: #06ad56;
            transform: translateY(-1px);
        }

        .chat-send-btn:active {
            transform: translateY(0);
        }

        .chat-send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .chat-message-content img {
            max-width: 400px;
            max-height: 400px;
            border-radius: 10px;
            cursor: pointer;
        }

        .chat-divider {
            text-align: center;
            margin: 24px 0;
        }

        .chat-divider span {
            background: #e5e5e5;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 13px;
            color: #999;
        }

        .loading-indicator {
            display: flex;
            gap: 6px;
            padding: 12px 16px;
        }

        .loading-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-indicator .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-indicator .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="chat-header-avatar">🤖</div>
            <div class="chat-header-info">
                <h3>NanoBot Assistant</h3>
                <p>在线</p>
            </div>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-area">
            <div class="chat-toolbar">
                <button class="chat-toolbar-btn" title="表情" onclick="showEmojiPicker()">😊</button>
                <button class="chat-toolbar-btn" title="图片" onclick="document.getElementById('chat-image-input').click()">📷</button>
                <button class="chat-toolbar-btn" title="文件" onclick="document.getElementById('chat-file-input').click()">📎</button>
                <input type="file" id="chat-image-input" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                <input type="file" id="chat-file-input" style="display:none" onchange="handleFileUpload(event)">
            </div>
            <div class="chat-input-row">
                <textarea id="chat-input" class="chat-input" placeholder="输入消息..." rows="1" onkeydown="handleChatKeyDown(event)" oninput="autoResizeTextarea(this)"></textarea>
                <button class="chat-send-btn" onclick="sendChatMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        
        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsHost = window.location.host;
            ws = new WebSocket(`${wsProtocol}//${wsHost}/ws/chat`);
            
            ws.onopen = function() {
                console.log('WebSocket connected');
            };
            
            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if (data.success) {
                    addMessage('bot', 'NanoBot', data.content);
                }
            };
            
            ws.onclose = function() {
                console.log('WebSocket disconnected, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }
        
        function handleChatKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendChatMessage();
            }
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 300) + 'px';
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const content = input.value.trim();
            if (!content) return;

            addMessage('user', '我', content);
            input.value = '';
            input.style.height = 'auto';

            const chatContainer = document.getElementById('chat-messages');
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = {
                    type: 'chat',
                    content: content
                };
                ws.send(JSON.stringify(message));
            } else {
                addMessage('system', '系统', 'WebSocket 连接未建立，请刷新页面重试');
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                addMessage('user', '我', '<img src="' + imgData + '" alt="图片">');
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const message = {
                        type: 'chat',
                        content: '[图片]',
                        image: imgData
                    };
                    ws.send(JSON.stringify(message));
                } else {
                    addMessage('system', '系统', 'WebSocket 连接未建立，请刷新页面重试');
                }
            };
            reader.readAsDataURL(file);
            event.target.value = '';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                addMessage('user', '我', '<pre style="max-width: 100%; overflow: auto;">' + escapeHtml(content) + '</pre>');
                
                if (ws && ws.readyState === WebSocket.OPEN) {
                    const message = {
                        type: 'chat',
                        content: '[文件]',
                        filename: file.name,
                        content: content
                    };
                    ws.send(JSON.stringify(message));
                } else {
                    addMessage('system', '系统', 'WebSocket 连接未建立，请刷新页面重试');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(type, sender, content, time) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message chat-message-' + type;
            
            const now = time || new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
            
            let avatar = '';
            if (type === 'user') {
                avatar = '<div class="chat-avatar">我</div>';
            } else if (type === 'assistant' || type === 'bot') {
                avatar = '<div class="chat-avatar">🤖</div>';
            }
            
            const bubbleHtml = `
                <div class="chat-bubble">
                    ${type !== 'system' ? '<div class="chat-sender">' + sender + '</div>' : ''}
                    <div class="chat-message-content">${content}</div>
                    ${type !== 'system' ? '<div class="chat-time">' + now + '</div>' : ''}
                </div>
            `;
            
            if (type === 'user') {
                msgDiv.innerHTML = bubbleHtml + avatar;
            } else if (type === 'system') {
                msgDiv.innerHTML = bubbleHtml;
            } else {
                msgDiv.innerHTML = avatar + bubbleHtml;
            }
            
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        function addDivider(text) {
            const container = document.getElementById('chat-messages');
            const divider = document.createElement('div');
            divider.className = 'chat-divider';
            divider.innerHTML = '<span>' + text + '</span>';
            container.appendChild(divider);
            container.scrollTop = container.scrollHeight;
        }

        function showEmojiPicker() {
            alert('表情选择器功能待实现');
        }

        function initChat() {
            addMessage('system', '系统', '欢迎使用 NanoBot 聊天界面');
            addDivider(new Date().toLocaleDateString('zh-CN', {month: 'long', day: 'numeric', year: 'numeric'}));
        }

        window.onload = function() {
            initChat();
            connectWebSocket();
            
            const textarea = document.getElementById('chat-input');
            autoResizeTextarea(textarea);
        };
    </script>
</body>
</html>
